apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone-source
  namespace: tekton-ci
spec:
  description: Clone the application repository into the shared workspace.
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: source
  volumes:
    - name: github-auth
      secret:
        secretName: github-auth
  steps:
    - name: clone
      image: alpine/git:2.47.1
      env:
        - name: HOME
          value: /tekton/home
      volumeMounts:
        - name: github-auth
          mountPath: /workspace/github-auth
          readOnly: true
      script: |
        set -e
        mkdir -p "$(workspaces.source.path)"
        mkdir -p "$HOME"
        rm -rf "$(workspaces.source.path)/repo"

        USERNAME="$(cat /workspace/github-auth/username)"
        PASSWORD="$(cat /workspace/github-auth/password)"

        AUTH_REPO_URL="$(params.repo-url)"
        if [[ "$AUTH_REPO_URL" == https://github.com/* ]]; then
          AUTH_REPO_URL="https://$USERNAME:$PASSWORD@${AUTH_REPO_URL#https://}"
        fi

        git clone --depth 1 --branch "$(params.revision)" "$AUTH_REPO_URL" "$(workspaces.source.path)/repo"
